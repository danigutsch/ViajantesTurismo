name: Setup CI Prerequisites
description: Set up the repository toolchains and restore shared prerequisites for CI jobs.

inputs:
  restore-targets:
    description: Newline-delimited solution or project paths to restore.
    required: false
    default: ViajantesTurismo.slnx
  restore-targets-file:
    description: Path to a newline-delimited file of solution or project paths to restore.
    required: false
    default: ""
  dotnet-global-json:
    description: Path to the global.json file used to select the .NET SDK.
    required: false
    default: global.json
  trust-dev-certificate:
    description: Whether to trust the ASP.NET HTTPS developer certificate.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Configure NuGet global-packages path
      shell: bash
      run: echo "NUGET_PACKAGES=$GITHUB_WORKSPACE/.nuget/packages" >> "$GITHUB_ENV"

    - name: Set up .NET SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        global-json-file: ${{ inputs.dotnet-global-json }}
        cache: true
        cache-dependency-path: |
          **/packages.lock.json

    - name: Restore .NET dependencies
      shell: bash
      env:
        RESTORE_TARGETS: ${{ inputs.restore-targets }}
        RESTORE_TARGETS_FILE: ${{ inputs.restore-targets-file }}
      run: |
        if [[ -n "${RESTORE_TARGETS_FILE}" ]]; then
          while IFS= read -r restore_target; do
            [[ -z "$restore_target" ]] && continue
            dotnet restore "$restore_target" --locked-mode
          done < "${RESTORE_TARGETS_FILE}"
          exit 0
        fi

        while IFS= read -r restore_target; do
          [[ -z "$restore_target" ]] && continue
          dotnet restore "$restore_target" --locked-mode
        done <<< "$RESTORE_TARGETS"

    - name: Restore .NET local tools
      shell: bash
      run: dotnet tool restore

    - name: Trust HTTPS developer certificate
      if: ${{ inputs.trust-dev-certificate == 'true' }}
      shell: bash
      run: |
        dotnet dev-certs https --trust || true
        echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust" >> "$GITHUB_ENV"
