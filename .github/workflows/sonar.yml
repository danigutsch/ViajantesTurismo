name: SonarCloud

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.change-scope.outputs.build_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect docs-only changes
        id: change-scope
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_AFTER_SHA: ${{ github.event.after }}
        run: bash scripts/detect-changes.sh

  sonarcloud:
    name: SonarCloud
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
    runs-on: ubuntu-latest
    env:
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up CI prerequisites
        uses: ./.github/actions/setup-ci-prerequisites

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: bash scripts/run-sonar-analysis.sh

      - name: Upload Sonar coverage input
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          if-no-files-found: error
          name: sonar-coverage
          path: TestResults/sonar-coverage.xml
          retention-days: 7
