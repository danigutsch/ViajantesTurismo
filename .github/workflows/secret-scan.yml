name: Secret Scan

'on':
  pull_request: {}
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sarif_present: ${{ steps.sarif.outputs.present }}
    env:
      GITLEAKS_VERSION: 8.9.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Gitleaks
        shell: bash
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksums="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          curl_args=(
            --fail
            --silent
            --show-error
            --location
            --proto '=https'
            --proto-redir '=https'
            --tlsv1.2
          )

          curl "${curl_args[@]}" --output "$archive" "$base_url/$archive"
          curl "${curl_args[@]}" --output "$checksums" "$base_url/$checksums"
          grep "  $archive$" "$checksums" | sha256sum --check --status
          tar -xzf "$archive" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Scan repository for secrets
        id: gitleaks
        shell: bash
        run: |
          set +e
          gitleaks detect \
            --source . \
            --no-git \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record SARIF availability
        id: sarif
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -f gitleaks.sarif ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF artifact
        if: ${{ always() && steps.sarif.outputs.present == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          if-no-files-found: ignore
          name: gitleaks-sarif
          path: gitleaks.sarif
          retention-days: 7

      - name: Fail on detected secrets
        if: ${{ steps.gitleaks.outputs.exit_code != '0' }}
        shell: bash
        run: |
          echo "Gitleaks detected one or more potential secrets." >&2
          exit 1

  upload-secret-scan-sarif:
    name: Publish Secret Scan SARIF
    needs:
      - secret-scan
    if: ${{ always() && needs.secret-scan.outputs.sarif_present == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gitleaks-sarif
          path: .

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
