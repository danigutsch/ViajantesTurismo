name: Secret Scan

'on':
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.9.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Gitleaks
        shell: bash
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksums="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          curl -fsSLo "$archive" "$base_url/$archive"
          curl -fsSLo "$checksums" "$base_url/$checksums"
          grep "  $archive$" "$checksums" | sha256sum --check --status
          tar -xzf "$archive" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Scan repository for secrets
        id: gitleaks
        shell: bash
        run: |
          set +e
          gitleaks dir . \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload SARIF results
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@d02a7766a1131f2a16daab6a31d328a0b2a47444 # v4.30.8
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Fail on detected secrets
        if: ${{ steps.gitleaks.outputs.exit_code != '0' }}
        shell: bash
        run: |
          echo "Gitleaks detected one or more potential secrets." >&2
          exit 1
