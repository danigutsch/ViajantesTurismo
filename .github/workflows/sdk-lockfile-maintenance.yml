name: SDK Lockfile Maintenance

on:
  push:
    branches:
      - 'dependabot/dotnet_sdk/**'
    paths:
      - global.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-sdk-lockfiles:
    name: Refresh SDK Lockfiles
    if: ${{ github.actor == 'dependabot[bot]' && startsWith(github.ref_name, 'dependabot/dotnet_sdk/') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Refresh lock files for the pinned SDK
        run: bash scripts/refresh-sdk-lockfiles.sh

      - name: Detect lock file updates
        id: lockfiles
        shell: bash
        run: |
          if git diff --quiet -- '**/packages.lock.json'; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit refreshed lock files
        if: ${{ steps.lockfiles.outputs.changed == 'true' }}
        shell: bash
        run: |
          sdk_version="$(python3 -c 'import json; print(json.load(open("global.json", encoding="utf-8"))["sdk"]["version"])')"

          git add '**/packages.lock.json'
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -m "build(deps): refresh lock files for SDK ${sdk_version}"

      - name: Push refreshed lock files
        if: ${{ steps.lockfiles.outputs.changed == 'true' }}
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${BRANCH_NAME}"
