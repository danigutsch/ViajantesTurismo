name: SDK Lockfile Maintenance

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - global.json

permissions:
  contents: read

jobs:
  refresh-sdk-lockfiles:
    name: Refresh SDK Lockfiles
    if: ${{ github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/dotnet_sdk/') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Refresh lock files for the pinned SDK
        run: bash scripts/refresh-sdk-lockfiles.sh

      - name: Detect lock file updates
        id: lockfiles
        shell: bash
        run: |
          if git diff --quiet -- '**/packages.lock.json'; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit refreshed lock files
        if: ${{ steps.lockfiles.outputs.changed == 'true' }}
        shell: bash
        run: |
          sdk_version="$(python3 -c 'import json; print(json.load(open("global.json", encoding="utf-8"))["sdk"]["version"])')"

          git add '**/packages.lock.json'
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -m "build(deps): refresh lock files for SDK ${sdk_version}"

      - name: Push refreshed lock files
        if: ${{ steps.lockfiles.outputs.changed == 'true' }}
        shell: bash
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: git push origin "HEAD:${PR_HEAD_REF}"
