name: Devcontainer Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - .devcontainer/**
      - .github/workflows/devcontainer-smoke.yml
      - .nvmrc
      - global.json
      - package.json
      - package-lock.json
      - NuGet.Config
      - Directory.Packages.props
      - ViajantesTurismo.slnx
      - scripts/install-git-hooks.sh
      - scripts/run-devcontainer-smoke.sh
  push:
    branches:
      - main
    paths:
      - .devcontainer/**
      - .github/workflows/devcontainer-smoke.yml
      - .nvmrc
      - global.json
      - package.json
      - package-lock.json
      - NuGet.Config
      - Directory.Packages.props
      - ViajantesTurismo.slnx
      - scripts/install-git-hooks.sh
      - scripts/run-devcontainer-smoke.sh
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  devcontainer-smoke:
    name: Devcontainer Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc

      - name: Run devcontainer smoke script
        shell: bash
        run: bash scripts/run-devcontainer-smoke.sh

      - name: Upload devcontainer smoke logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ failure() }}
        with:
          if-no-files-found: error
          name: devcontainer-smoke-logs
          path: TestResults/devcontainer-smoke/**
          retention-days: 7
