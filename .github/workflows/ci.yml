name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_required: ${{ steps.change-scope.outputs.build_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: change-scope
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_AFTER_SHA: ${{ github.event.after }}
        run: bash scripts/detect-changes.sh

  build-and-test:
    name: Build and Test
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up CI prerequisites
        uses: ./.github/actions/setup-ci-prerequisites

      - name: Build solution
        id: build-solution
        run: dotnet build ViajantesTurismo.slnx --no-restore

      - name: Install Playwright browsers
        id: install-playwright
        run: pwsh $(find tests -name playwright.ps1 -path "*/bin/Debug/*" | head -1) install --with-deps

      - name: Run tests
        id: run-tests
        run: bash scripts/run-tests-with-coverage.sh

      - name: Capture build and test diagnostics
        if: ${{ failure() }}
        env:
          BUILD_OUTCOME: ${{ steps.build-solution.outcome }}
          PLAYWRIGHT_OUTCOME: ${{ steps.install-playwright.outcome }}
          TEST_OUTCOME: ${{ steps.run-tests.outcome }}
        run: |
          bash scripts/collect-ci-build-test-diagnostics.sh \
            "$BUILD_OUTCOME" \
            "$PLAYWRIGHT_OUTCOME" \
            "$TEST_OUTCOME"

      - name: Upload build and test diagnostics
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ failure() }}
        with:
          if-no-files-found: error
          name: build-test-diagnostics
          path: TestResults/ci-diagnostics/**
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ always() && steps.run-tests.outcome != 'skipped' }}
        with:
          if-no-files-found: error
          name: test-results
          path: "**/TestResults/**"
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ always() && steps.run-tests.outcome != 'skipped' }}
        with:
          if-no-files-found: error
          name: coverage-report
          path: "TestResults/CoverageReport/**"
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      - name: Run all linters
        run: npm run lint:all
