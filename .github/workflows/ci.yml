name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      build_required: ${{ steps.change-scope.outputs.build_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: change-scope
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_AFTER_SHA: ${{ github.event.after }}
        run: bash scripts/detect-changes.sh

  build-and-test:
    name: Build and Test
    needs:
      - detect-changes
      - lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Skip expensive validation for docs-only changes
        if: ${{ needs.detect-changes.outputs.build_required != 'true' }}
        shell: bash
        run: |
          echo "Only documentation changes were detected."
          echo "Build, test, coverage, and SonarCloud analysis are intentionally skipped."
          {
            echo "## Build, test, coverage, and SonarCloud"
            echo
            echo "Only documentation changes were detected, so validation was skipped by design."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate SonarCloud configuration
        if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
        env:
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: bash scripts/validate-sonar-analysis-config.sh

      - name: Set up CI prerequisites
        if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
        uses: ./.github/actions/setup-ci-prerequisites

      - name: Cache SonarCloud packages
        if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonarcloud-cache-v1
          restore-keys: |
            ${{ runner.os }}-sonarcloud-cache-

      - name: Run build, tests, coverage, and SonarCloud analysis
        if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
        id: run-validation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -o pipefail
          mkdir -p TestResults
          bash scripts/run-sonar-analysis.sh 2>&1 | tee TestResults/sonar-analysis.log

      - name: Publish validation summary to GitHub
        if: ${{ always() && steps.run-validation.outcome != 'skipped' }}
        env:
          VALIDATION_OUTCOME: ${{ steps.run-validation.outcome }}
        run: bash scripts/write-github-sonar-summary.sh "$VALIDATION_OUTCOME"

      - name: Capture build and test diagnostics
        if: ${{ failure() }}
        env:
          BUILD_OUTCOME: ${{ steps.run-validation.outcome }}
          PLAYWRIGHT_OUTCOME: included-in-validation
          TEST_OUTCOME: included-in-validation
        run: |
          bash scripts/collect-ci-build-test-diagnostics.sh \
            "$BUILD_OUTCOME" \
            "$PLAYWRIGHT_OUTCOME" \
            "$TEST_OUTCOME"

      - name: Upload build and test diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() }}
        with:
          if-no-files-found: error
          name: build-test-diagnostics
          path: TestResults/ci-diagnostics/**
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ always() && steps.run-validation.outcome != 'skipped' }}
        with:
          if-no-files-found: ignore
          name: test-results
          path: "**/TestResults/**"
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ always() && steps.run-validation.outcome != 'skipped' }}
        with:
          if-no-files-found: ignore
          name: coverage-report
          path: "TestResults/CoverageReport/**"
          retention-days: 7

      - name: Upload Sonar coverage input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ always() && steps.run-validation.outcome != 'skipped' }}
        with:
          if-no-files-found: ignore
          name: sonar-coverage
          path: TestResults/sonar-coverage.xml
          retention-days: 7

      - name: Upload Sonar analysis log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ always() && steps.run-validation.outcome != 'skipped' }}
        with:
          if-no-files-found: ignore
          name: sonar-analysis-log
          path: TestResults/sonar-analysis.log
          retention-days: 7

  sonarcloud:
    name: SonarCloud
    needs:
      - detect-changes
      - build-and-test
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Report SonarCloud status
        shell: bash
        run: |
          if [[ "${{ needs.detect-changes.outputs.build_required }}" != "true" ]]; then
              echo "SonarCloud analysis was skipped because only documentation changes were detected."
              exit 0
          fi

          if [[ "${{ needs.build-and-test.result }}" == "success" ]]; then
              echo "SonarCloud analysis completed successfully within the Build and Test job."
              exit 0
          fi

          echo "SonarCloud analysis failed within the Build and Test job." >&2
          exit 1

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get changed Markdown files
        if: ${{ github.event_name == 'pull_request' }}
        id: changed-markdown-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            README.md
            docs/**/*.md
            .github/**/*.md
            .devcontainer/**/*.md
            src/**/*.md
            tests/**/*.md
            benchmarks/**/*.md
            samples/**/*.md
          separator: ","

      - name: Lint changed Markdown files in pull requests
        if: ${{ github.event_name == 'pull_request' && steps.changed-markdown-files.outputs.any_changed == 'true' }}
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: ${{ steps.changed-markdown-files.outputs.all_changed_files }}
          config: .markdownlint-cli2.jsonc
          separator: ","

      - name: Lint all Markdown files on mainline runs
        if: ${{ github.event_name != 'pull_request' }}
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            README.md
            docs/**/*.md
            .github/**/*.md
            .devcontainer/**/*.md
            src/**/*.md
            tests/**/*.md
            benchmarks/**/*.md
            samples/**/*.md
          config: .markdownlint-cli2.jsonc

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Harden npm execution defaults
        run: |
          npm config set ignore-scripts true
          npm config set audit false
          npm config set fund false

      - name: Run all linters
        run: bash scripts/lint-all.sh
