name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.change-scope.outputs.build_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: change-scope
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_AFTER_SHA: ${{ github.event.after }}
        run: bash scripts/detect-changes.sh

  build-and-test:
    name: Build and Test
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.build_required == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Restore .NET dependencies
        run: dotnet restore ViajantesTurismo.slnx

      - name: Build solution
        run: dotnet build ViajantesTurismo.slnx --no-restore

      - name: Install Playwright browsers
        run: pwsh $(find tests -name playwright.ps1 -path "*/bin/Debug/*" | head -1) install --with-deps

      - name: Trust HTTPS developer certificate
        run: |
          dotnet dev-certs https --trust || true
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust" >> "$GITHUB_ENV"

      - name: Run tests
        id: run-tests
        run: dotnet test --solution ViajantesTurismo.slnx --no-build

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ always() && steps.run-tests.outcome != 'skipped' }}
        with:
          if-no-files-found: error
          name: test-results
          path: "**/TestResults/**"
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run all linters
        run: npm run lint:all
