version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      nuget-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      nuget-security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
      - .net

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      npm-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: deps
      include: scope
